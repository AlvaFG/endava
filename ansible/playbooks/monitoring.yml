---
- name: Configurar monitoreo con Node Exporter
  hosts: all
  become: true

  vars:
    node_exporter_version: "1.7.0"

  tasks:
    - name: Crear usuario node_exporter
      user:
        name: node_exporter
        shell: /usr/sbin/nologin
        system: yes
        create_home: no

    - name: Descargar Node Exporter
      get_url:
        url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
        dest: /tmp/node_exporter.tar.gz

    - name: Extraer Node Exporter
      unarchive:
        src: /tmp/node_exporter.tar.gz
        dest: /tmp/
        remote_src: yes

    - name: Copiar binario
      copy:
        src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
        dest: /usr/local/bin/node_exporter
        mode: "0755"
        owner: node_exporter
        group: node_exporter
        remote_src: yes

    - name: Crear servicio systemd
      copy:
        dest: /etc/systemd/system/node_exporter.service
        content: |
          [Unit]
          Description=Node Exporter
          After=network.target

          [Service]
          User=node_exporter
          Group=node_exporter
          Type=simple
          ExecStart=/usr/local/bin/node_exporter

          [Install]
          WantedBy=multi-user.target
      notify: restart node_exporter

    - name: Iniciar y habilitar Node Exporter
      systemd:
        name: node_exporter
        state: started
        enabled: yes
        daemon_reload: yes

    - name: Crear script de health check
      copy:
        dest: /usr/local/bin/health-check.sh
        mode: "0755"
        content: |
          #!/bin/bash
          echo "=== Health Check: $(hostname) ==="
          echo "Date: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo ""
          echo "--- Uptime ---"
          uptime
          echo ""
          echo "--- Memory ---"
          free -m
          echo ""
          echo "--- Disk ---"
          df -h /
          echo ""
          echo "--- CPU Load ---"
          cat /proc/loadavg
          echo ""
          echo "--- Node Exporter ---"
          systemctl is-active node_exporter

    - name: Configurar cron de health check (cada 6 horas)
      cron:
        name: "health check report"
        minute: "0"
        hour: "*/6"
        job: "/usr/local/bin/health-check.sh >> /var/log/health-check.log 2>&1"

    - name: Limpiar archivos temporales
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/node_exporter.tar.gz
        - "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64"

  handlers:
    - name: restart node_exporter
      systemd:
        name: node_exporter
        state: restarted
        daemon_reload: yes
